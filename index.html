<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Financeiro Proporcional</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        :root { --primary: #2ecc71; --primary-hover: #27ae60; }
        body { padding-bottom: 2rem; }
        ins { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 2.2rem; display: block; margin: 0.5rem 0; }
        
        /* Ajustes para telas pequenas (Celulares) */
        @media (max-width: 600px) {
           .grid-inputs,.grid-form { grid-template-columns: 1fr!important; }
            h1 { font-size: 1.5rem; }
            ins { font-size: 1.8rem; }
           .card-resumo { padding: 1rem!important; }
        }

       .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
       .grid-form { display: grid; grid-template-columns: 2fr 1fr auto; gap: 0.5rem; align-items: end; }
       .history-item { display: flex; justify-content: space-between; font-size: 0.95rem; padding: 12px 0; border-bottom: 1px solid #eee; align-items: center; }
       .delete-btn { color: #e74c3c; cursor: pointer; font-weight: bold; margin-left: 15px; padding: 8px; border: 1px solid #f8d7da; border-radius: 4px; line-height: 1; }
       .card-resumo { border: 2px solid #e0e0e0; padding: 2rem; border-radius: 16px; margin-bottom: 1.5rem; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
       .input-inline { border: none!important; background: #f9f9f9!important; width: 90px!important; text-align: right; border-bottom: 2px dashed #ccc!important; padding: 4px!important; margin: 0!important; }
       .name-header { font-weight: bold; font-size: 1.1rem; margin-bottom: 8px; border: none; border-bottom: 2px solid #eee; width: 100%; }
        hr { margin: 1.5rem 0; opacity: 0.2; }
    </style>
</head>
<body class="container">
    <header style="margin-top: 1rem;">
        <h1>Gestor Proporcional</h1>
        <mark><small>Ciclo: <span id="labelCiclo">--/--</span></small></mark>
    </header>

    <main>
        <section id="config">
            <details>
                <summary role="button" class="outline secondary">1. Configurar Nomes e Salários</summary>
                <div class="grid-inputs">
                    <article>
                        <input type="text" id="nomeV1" class="name-header" placeholder="Nome do Integrante 1" oninput="app.update()">
                        <label>Renda Mensal (R$)</label>
                        <input type="number" id="rendaV1" value="2000" oninput="app.update()">
                    </article>
                    <article>
                        <input type="text" id="nomeV2" class="name-header" placeholder="Nome do Integrante 2" oninput="app.update()">
                        <label>Renda Mensal (R$)</label>
                        <input type="number" id="rendaV2" value="5000" oninput="app.update()">
                    </article>
                </div>
            </details>
        </section>

        <section id="fixos">
            <details open>
                <summary role="button" class="outline">2. Contas Fixas (Mês)</summary>
                <div id="listaFixos"></div>
                <hr>
                <form onsubmit="app.addItem(event, 'fixos')">
                    <p><small><strong>Adicionar nova conta:</strong></small></p>
                    <div class="grid-form">
                        <div><label>Descrição</label><input type="text" id="descFixo" placeholder="Ex: Aluguel"></div>
                        <div><label>Valor (R$)</label><input type="number" id="valFixo" placeholder="0,00" step="0.01"></div>
                        <button type="submit" style="margin-bottom: 4px;">+</button>
                    </div>
                </form>
            </details>
        </section>

        <section id="dashboard" style="text-align: center; margin: 2rem 0;">
            <div class="card-resumo">
                <p style="margin-bottom: 0; color: #666;">Orçamento disponível para <strong>HOJE</strong>:</p>
                <ins id="valorDiario">R$ 0,00</ins>
                <div id="infoDivisao" style="font-size: 0.9rem; line-height: 1.6; color: #333;"></div>
            </div>
        </section>

        <section id="cotidiano">
            <h3>3. Lançar Gasto de Hoje</h3>
            <form onsubmit="app.addItem(event, 'cotidiano')">
                <div class="grid-form">
                    <div><label>Onde gastou?</label><input type="text" id="descCotidiano" placeholder="Ex: Padaria, Farmácia" required></div>
                    <div><label>Quanto? (R$)</label><input type="number" id="valCotidiano" placeholder="0,00" step="0.01" required></div>
                    <button type="submit" class="contrast" style="margin-bottom: 4px;">Lançar</button>
                </div>
            </form>
            
            <details>
                <summary>Ver Histórico do Mês</summary>
                <div id="listaCotidiano"></div>
                <button class="outline secondary" style="margin-top: 2rem; width: 100%;" onclick="app.reset()">Resetar Todo o App</button>
            </details>
        </section>
    </main>

    <script>
        const app = {
            state: JSON.parse(localStorage.getItem('gestor_v1.5')) || {
                n1: "Pessoa 1", n2: "Pessoa 2",
                fixos:,
                cotidiano:
            },

            init() {
                document.getElementById('nomeV1').value = this.state.n1;
                document.getElementById('nomeV2').value = this.state.n2;
                this.update();
            },

            getCiclo() {
                const hoje = new Date();
                let inicio = new Date(hoje.getFullYear(), hoje.getMonth(), 5);
                if (hoje.getDate() < 5) inicio.setMonth(inicio.getMonth() - 1);
                let fim = new Date(inicio.getFullYear(), inicio.getMonth() + 1, 5);
                return { inicio, fim };
            },

            update() {
                this.state.n1 = document.getElementById('nomeV1').value || "Pessoa 1";
                this.state.n2 = document.getElementById('nomeV2').value || "Pessoa 2";
                
                const r1 = parseFloat(document.getElementById('rendaV1').value) || 0;
                const r2 = parseFloat(document.getElementById('rendaV2').value) || 0;
                const { inicio, fim } = this.getCiclo();
                
                const totalSalarios = r1 + r2;
                const totalFixos = this.state.fixos.reduce((acc, g) => acc + parseFloat(g.valor || 0), 0);
                const totalCotidiano = this.state.cotidiano.reduce((acc, g) => acc + g.valor, 0);

                const p1 = totalSalarios > 0? (r1 / totalSalarios) : 0;
                const p2 = 1 - p1;

                const hoje = new Date();
                hoje.setHours(0,0,0,0);
                const diasRestantes = Math.max(1, Math.ceil((fim - hoje) / (1000 * 60 * 60 * 24)));
                
                const saldoParaCotidiano = totalSalarios - totalFixos - totalCotidiano;
                const diario = Math.max(0, saldoParaCotidiano / diasRestantes);

                document.getElementById('labelCiclo').innerText = `${inicio.toLocaleDateString('pt-BR')} até ${fim.toLocaleDateString('pt-BR')}`;
                document.getElementById('valorDiario').innerText = `R$ ${diario.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                
                document.getElementById('infoDivisao').innerHTML = `
                    <hr>
                    <strong>Total Contas Fixas: R$ ${totalFixos.toFixed(2)}</strong><br>
                    ${this.state.n1} (${(p1*100).toFixed(0)}%) paga: <strong>R$ ${(totalFixos * p1).toFixed(2)}</strong><br>
                    ${this.state.n2} (${(p2*100).toFixed(0)}%) paga: <strong>R$ ${(totalFixos * p2).toFixed(2)}</strong><br>
                    <hr>
                    <small>Gasto acumulado no ciclo: R$ ${totalCotidiano.toFixed(2)}<br>
                    Faltam <strong>${diasRestantes} dias</strong> para o novo ciclo.</small>
                `;
                
                this.renderFixos();
                this.renderCotidiano();
                localStorage.setItem('gestor_v1.5', JSON.stringify(this.state));
            },

            addItem(e, tipo) {
                e.preventDefault();
                const descId = tipo === 'fixos'? 'descFixo' : 'descCotidiano';
                const valId = tipo === 'fixos'? 'valFixo' : 'valCotidiano';
                const desc = document.getElementById(descId).value;
                const valor = parseFloat(document.getElementById(valId).value) || 0;
                if(!desc && tipo === 'fixos') return;
                this.state[tipo].push({ id: Date.now(), desc, valor, data: new Date().toLocaleDateString('pt-BR') });
                document.getElementById(descId).value = '';
                document.getElementById(valId).value = '';
                this.update();
            },

            editValorFixo(id, novoValor) {
                const item = this.state.fixos.find(i => i.id === id);
                if(item) {
                    item.valor = parseFloat(novoValor) || 0;
                    this.update();
                }
            },

            removeItem(id, tipo) {
                if(confirm("Remover este item?")) {
                    this.state[tipo] = this.state[tipo].filter(item => item.id!== id);
                    this.update();
                }
            },

            renderFixos() {
                const container = document.getElementById('listaFixos');
                container.innerHTML = this.state.fixos.map(item => `
                    <div class="history-item">
                        <span>${item.desc}</span>
                        <span>
                            R$ <input type="number" step="0.01" class="input-inline" value="${item.valor}" oninput="app.editValorFixo(${item.id}, this.value)">
                            <span class="delete-btn" onclick="app.removeItem(${item.id}, 'fixos')">✕</span>
                        </span>
                    </div>
                `).join('');
            },

            renderCotidiano() {
                const container = document.getElementById('listaCotidiano');
                container.innerHTML = this.state.cotidiano.map(item => `
                    <div class="history-item">
                        <span><strong>${item.desc}</strong> <small>(${item.data})</small></span>
                        <span>
                            R$ ${item.valor.toFixed(2)}
                            <span class="delete-btn" onclick="app.removeItem(${item.id}, 'cotidiano')">✕</span>
                        </span>
                    </div>
                `).reverse().join('');
            },

            reset() {
                if(confirm("Deseja apagar TUDO e começar do zero?")) {
                    localStorage.removeItem('gestor_v1.5');
                    location.reload();
                }
            }
        };
        app.init();
    </script>
</body>
</html>
