<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Gestor Proporcional v2.1</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        :root { --primary: #2ecc71; }
        body { padding-bottom: 2rem; background-color: #f4f7f6; }
        ins { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 2.2rem; display: block; margin: 0.5rem 0; }
        @media (max-width: 600px) {.grid-inputs,.grid-form { grid-template-columns: 1fr!important; } }
       .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
       .grid-form { display: grid; grid-template-columns: 2fr 1fr auto; gap: 0.5rem; align-items: end; }
       .history-item { display: flex; justify-content: space-between; font-size: 0.95rem; padding: 12px 0; border-bottom: 1px solid #eee; align-items: center; }
       .delete-btn { color: #e74c3c; cursor: pointer; font-weight: bold; margin-left: 15px; padding: 8px; border: 1px solid #f8d7da; border-radius: 4px; }
       .card-resumo { border: 2px solid #e0e0e0; padding: 2rem; border-radius: 16px; margin-bottom: 1.5rem; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
       .name-input { font-weight: bold; color: #2c3e50; border: none; border-bottom: 2px solid #2ecc71; margin-bottom: 10px; width: 100%; padding: 5px; }
       .btn-save { background-color: #2ecc71; border: none; font-weight: bold; width: 100%; }
    </style>
</head>
<body class="container">
    <header style="margin-top: 1rem;">
        <h1>Gestor Proporcional</h1>
        <mark><small>Ciclo: <span id="labelCiclo">--/--</span></small></mark>
    </header>

    <main>
        <section id="config">
            <article>
                <header><strong>1. Identificação e Rendas</strong></header>
                <div class="grid-inputs">
                    <div>
                        <label>Nome 1</label>
                        <input type="text" id="nomeV1" class="name-input" oninput="app.autoSalvar()">
                        <label>Salário (R$)</label>
                        <input type="number" id="rendaV1" oninput="app.autoSalvar()">
                    </div>
                    <div>
                        <label>Nome 2</label>
                        <input type="text" id="nomeV2" class="name-input" oninput="app.autoSalvar()">
                        <label>Salário (R$)</label>
                        <input type="number" id="rendaV2" oninput="app.autoSalvar()">
                    </div>
                </div>
                <button class="btn-save" onclick="app.forcarSalvar()">💾 SALVAR AGORA</button>
            </article>
        </section>

        <section id="fixos">
            <details>
                <summary role="button" class="outline">2. Contas Fixas do Mês</summary>
                <div id="listaFixos"></div>
                <hr>
                <form onsubmit="app.addItem(event, 'fixos')">
                    <div class="grid-form">
                        <div><label>Descrição</label><input type="text" id="descFixo" placeholder="Ex: Aluguel"></div>
                        <div><label>Valor (R$)</label><input type="number" id="valFixo" placeholder="0,00" step="0.01"></div>
                        <button type="submit" style="margin-bottom: 4px;">+</button>
                    </div>
                </form>
            </details>
        </section>

        <section id="dashboard" style="text-align: center; margin: 2rem 0;">
            <div class="card-resumo">
                <p style="margin-bottom: 0; color: #666;">Orçamento disponível para <strong>HOJE</strong>:</p>
                <ins id="valorDiario">R$ 0,00</ins>
                <div id="infoDivisao" style="font-size: 0.95rem; line-height: 1.6; color: #333;"></div>
            </div>
        </section>

        <section id="cotidiano">
            <h3>3. Lançar Gasto de Hoje</h3>
            <form onsubmit="app.addItem(event, 'cotidiano')">
                <div class="grid-form">
                    <div><label>Onde gastou?</label><input type="text" id="descCotidiano" placeholder="Ex: Padaria" required></div>
                    <div><label>Quanto? (R$)</label><input type="number" id="valCotidiano" placeholder="0,00" step="0.01" required></div>
                    <button type="submit" class="contrast" style="margin-bottom: 4px;">Lançar</button>
                </div>
            </form>
            <details>
                <summary>Ver Histórico e Opções</summary>
                <div id="listaCotidiano"></div>
                <button class="outline secondary" style="margin-top: 2rem; width: 100%;" onclick="app.reset()">Zerar Tudo</button>
            </details>
        </section>
    </main>

    <script>
        const app = {
            isInitializing: true, // Trava de segurança contra race conditions
            state: { n1: "Pessoa 1", n2: "Pessoa 2", r1: 2000, r2: 5000, fixos:, cotidiano: },

            init() {
                const salvo = localStorage.getItem('elvis_gestor_v21');
                if (salvo) { this.state = JSON.parse(salvo); }

                // Carregamento forçado dos inputs
                document.getElementById('nomeV1').value = this.state.n1;
                document.getElementById('nomeV2').value = this.state.n2;
                document.getElementById('rendaV1').value = this.state.r1;
                document.getElementById('rendaV2').value = this.state.r2;

                this.isInitializing = false; // Destrava o salvamento
                this.update();
            },

            autoSalvar() {
                if (this.isInitializing) return;
                this.state.n1 = document.getElementById('nomeV1').value || "Pessoa 1";
                this.state.n2 = document.getElementById('nomeV2').value || "Pessoa 2";
                this.state.r1 = parseFloat(document.getElementById('rendaV1').value) || 0;
                this.state.r2 = parseFloat(document.getElementById('rendaV2').value) || 0;
                localStorage.setItem('elvis_gestor_v21', JSON.stringify(this.state));
                this.update();
            },

            forcarSalvar() {
                this.autoSalvar();
                alert("Dados fixados com sucesso!");
            },

            getCiclo() {
                const hoje = new Date();
                let inicio = new Date(hoje.getFullYear(), hoje.getMonth(), 5);
                if (hoje.getDate() < 5) inicio.setMonth(inicio.getMonth() - 1);
                let fim = new Date(inicio.getFullYear(), inicio.getMonth() + 1, 5);
                return { inicio, fim };
            },

            update() {
                const { inicio, fim } = this.getCiclo();
                const totalFixos = this.state.fixos.reduce((acc, g) => acc + parseFloat(g.valor || 0), 0);
                const totalCotidiano = this.state.cotidiano.reduce((acc, g) => acc + g.valor, 0);
                const totalSalarios = this.state.r1 + this.state.r2;
                const p1 = totalSalarios > 0? (this.state.r1 / totalSalarios) : 0;
                const p2 = 1 - p1;
                const hoje = new Date();
                hoje.setHours(0,0,0,0);
                const diasRestantes = Math.max(1, Math.ceil((fim - hoje) / (86400000)));
                const diario = Math.max(0, (totalSalarios - totalFixos - totalCotidiano) / diasRestantes);

                document.getElementById('labelCiclo').innerText = `${inicio.toLocaleDateString('pt-BR')} até ${fim.toLocaleDateString('pt-BR')}`;
                document.getElementById('valorDiario').innerText = `R$ ${diario.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                document.getElementById('infoDivisao').innerHTML = `<hr><strong>Fixos: R$ ${totalFixos.toFixed(2)}</strong><br>${this.state.n1}: R$ ${(totalFixos * p1).toFixed(2)} | ${this.state.n2}: R$ ${(totalFixos * p2).toFixed(2)}<br><hr><small>Faltam ${diasRestantes} dias.</small>`;
                this.render('listaFixos', 'fixos');
                this.render('listaCotidiano', 'cotidiano');
            },

            addItem(e, tipo) {
                e.preventDefault();
                const desc = document.getElementById(tipo === 'fixos'? 'descFixo' : 'descCotidiano').value;
                const valor = parseFloat(document.getElementById(tipo === 'fixos'? 'valFixo' : 'valCotidiano').value) || 0;
                if(!desc && tipo === 'fixos') return;
                this.state[tipo].push({ id: Date.now(), desc, valor, data: new Date().toLocaleDateString('pt-BR') });
                this.autoSalvar();
            },

            removeItem(id, tipo) {
                if(confirm("Remover?")) { this.state[tipo] = this.state[tipo].filter(i => i.id!== id); this.autoSalvar(); }
            },

            render(containerId, tipo) {
                document.getElementById(containerId).innerHTML = this.state[tipo].map(item => `
                    <div class="history-item"><span><strong>${item.desc}</strong></span>
                    <span>R$ ${item.valor.toFixed(2)}<span class="delete-btn" onclick="app.removeItem(${item.id}, '${tipo}')">✕</span></span></div>`).reverse().join('');
            },

            reset() { if(confirm("Zerar app?")) { localStorage.removeItem('elvis_gestor_v21'); location.reload(); } }
        };
        window.onload = () => app.init();
    </script>
</body>
</html>
